<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0d18"/>
      <stop offset="100%" stop-color="#1f2433"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.1" r="0.6">
      <stop offset="0%" stop-color="rgba(249,106,16,0.45)"/>
      <stop offset="100%" stop-color="rgba(249,106,16,0)"/>
    </radialGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8a36"/>
      <stop offset="100%" stop-color="#e85206"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Grid lines -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="1">
    <path d="M0 80 H1200 M0 160 H1200 M0 240 H1200 M0 320 H1200 M0 400 H1200 M0 480 H1200 M0 560 H1200"/>
    <path d="M80 0 V630 M160 0 V630 M240 0 V630 M320 0 V630 M400 0 V630 M480 0 V630 M560 0 V630 M640 0 V630 M720 0 V630 M800 0 V630 M880 0 V630 M960 0 V630 M1040 0 V630 M1120 0 V630"/>
  </g>

  <g direction="rtl">
    <!-- Brand mark -->
    <g transform="translate(80,80)">
      <rect width="64" height="64" rx="14" fill="url(#brand)"/>
      <text x="32" y="46" text-anchor="middle" font-family="Cairo, system-ui, sans-serif" font-size="40" font-weight="900" fill="#0a0d18">م</text>
    </g>
    <text x="160" y="125" font-family="Cairo, Tajawal, system-ui, sans-serif" font-size="28" font-weight="800" fill="#eceef2">Mostakil AI</text>

    <!-- Headline -->
    <text x="80" y="270" font-family="Cairo, Tajawal, system-ui, sans-serif" font-size="76" font-weight="900" fill="#eceef2" direction="rtl">مستقل الذكاء الاصطناعي</text>
    <text x="80" y="350" font-family="Cairo, Tajawal, system-ui, sans-serif" font-size="44" font-weight="800" fill="#ff8a36" direction="rtl">7 خدمات AI تبيعها على Upwork</text>
    <text x="80" y="410" font-family="Tajawal, system-ui, sans-serif" font-size="32" font-weight="500" fill="#a9aebd" direction="rtl">دليل عملي بالعربية — أول 1000$ في 90 يوماً</text>
  </g>

  <!-- Pill -->
  <g transform="translate(80,500)">
    <rect width="280" height="56" rx="28" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)"/>
    <text x="140" y="36" text-anchor="middle" font-family="Tajawal, system-ui, sans-serif" font-size="22" font-weight="700" fill="#eceef2">إصدار 2026 · PDF · RTL</text>
  </g>

  <!-- Price tag -->
  <g transform="translate(900,440) rotate(-6)">
    <rect x="-90" y="-44" width="200" height="100" rx="20" fill="url(#brand)"/>
    <text x="10" y="-4" text-anchor="middle" font-family="Cairo, system-ui, sans-serif" font-size="20" font-weight="800" fill="#0a0d18">عرض الإطلاق</text>
    <text x="10" y="42" text-anchor="middle" font-family="Cairo, system-ui, sans-serif" font-size="56" font-weight="900" fill="#0a0d18">$27</text>
  </g>
</svg>
